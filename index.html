<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Quiz Départements Français</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#46178f">

<style>
body{
  font-family: 'Segoe UI', Arial, sans-serif;
  text-align:center;
  background: linear-gradient(135deg,#46178f,#864cbf);
  margin:0;
  color:white;
}

.container{
  background:white;
  color:#333;
  padding:40px;
  margin:40px auto;
  max-width:600px;
  border-radius:15px;
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

h1{
  color:#46178f;
}

button{
  padding:14px;
  margin:10px;
  font-size:18px;
  cursor:pointer;
  border:none;
  border-radius:10px;
  transition:0.2s;
  font-weight:bold;
}

button:hover{
  transform:scale(1.05);
}

.answer{
  display:block;
  width:100%;
  margin:12px 0;
  font-size:18px;
  color:white;
}

.answer:nth-child(1){ background:#e21b3c; }
.answer:nth-child(2){ background:#1368ce; }
.answer:nth-child(3){ background:#d89e00; }
.answer:nth-child(4){ background:#26890c; }

.answer:hover{ filter:brightness(1.1); }

.hidden{ display:none; }

#question{ font-size:28px; margin-bottom:25px; }
#score{ font-weight:bold; font-size:20px; }
#gameover h2{ color:#e21b3c; }

input[type="checkbox"]{ transform:scale(1.3); margin-right:5px; }
label{ margin:10px; font-size:18px; }

#menu button{ background:#46178f; color:white; }
#menu button:hover{ background:#5f2db5; }
</style>
</head>
<body>

<div class="container">

<h1>Quiz Départements 🇫🇷</h1>

<!-- MENU -->
<div id="menu">
  <p>Choisis 2 informations :</p>
  <label><input type="checkbox" value="name"> Nom</label>
  <label><input type="checkbox" value="number"> Numéro</label>
  <label><input type="checkbox" value="prefecture"> Préfecture</label>
  <br><br>
  <button onclick="startGame()">Commencer</button>
  <p>Meilleur score : <span id="bestScore">0</span></p>
</div>

<!-- GAME -->
<div id="game" class="hidden">
  <h2 id="question"></h2>
  <div id="answers"></div>
  <p>Score actuel : <span id="score">0</span></p>
  <p>Meilleur score pour cette combinaison : <span id="bestScoreInGame">0</span></p>
</div>

<!-- GAME OVER -->
<div id="gameover" class="hidden">
  <h2>❌ Mauvaise réponse</h2>
  <p id="correct"></p>
  <p>Score final : <span id="finalScore"></span></p>
  <button onclick="replaySame()">Rejouer avec mêmes options</button>
  <button onclick="backToMenu()">Changer options</button>
</div>

let modeA;
let modeB;
let score = 0;
let current;
let questionType;
let answerType;

function startGame(){
  const selected = [...document.querySelectorAll("input:checked")];
  if(selected.length !== 2){ alert("Choisis exactement 2 options !"); return; }

  modeA = selected[0].value;
  modeB = selected[1].value;

  document.getElementById("menu").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  document.getElementById("gameover").classList.add("hidden");

  score = 0;
  document.getElementById("score").innerText = score;
  updateBestScoreDisplay();
  nextQuestion();
}

function getScoreKey(){ return `bestScore_${modeA}_${modeB}`; }

function updateBestScoreDisplay(){
  const best = localStorage.getItem(getScoreKey()) || 0;
  document.getElementById("bestScore").innerText = best;
  document.getElementById("bestScoreInGame").innerText = best;
}

function nextQuestion(){
  current = departements[Math.floor(Math.random()*departements.length)];
  if(Math.random()<0.5){ questionType=modeA; answerType=modeB; }
  else{ questionType=modeB; answerType=modeA; }

  document.getElementById("question").innerText = "Trouve : " + current[questionType];

  const answers = [current];
  while(answers.length<4){
    let d = departements[Math.floor(Math.random()*departements.length)];
    if(!answers.includes(d)) answers.push(d);
  }
  answers.sort(()=>Math.random()-0.5);

  const container = document.getElementById("answers");
  container.innerHTML="";
  answers.forEach(d=>{
    let btn = document.createElement("button");
    btn.className="answer";
    btn.innerText = d[answerType];
    btn.onclick = ()=>checkAnswer(d);
    container.appendChild(btn);
  });
}

function checkAnswer(dep){
  if(dep===current){
    score++;
    document.getElementById("score").innerText = score;
    nextQuestion();
  } else {
    document.getElementById("game").classList.add("hidden");
    document.getElementById("gameover").classList.remove("hidden");

    document.getElementById("correct").innerText = "Bonne réponse : " + current[answerType];
    document.getElementById("finalScore").innerText = score;

    let best = localStorage.getItem(getScoreKey()) || 0;
    if(score>best) localStorage.setItem(getScoreKey(), score);

    updateBestScoreDisplay();
  }
}

function replaySame(){
  document.getElementById("gameover").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  score=0;
  document.getElementById("score").innerText=score;
  updateBestScoreDisplay();
  nextQuestion();
}

function backToMenu(){
  document.getElementById("gameover").classList.add("hidden");
  document.getElementById("game").classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");
}
</script>
