<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Quiz Départements Français</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#46178f">

<style>
body{
font-family:'Segoe UI',Arial,sans-serif;
text-align:center;
background:linear-gradient(135deg,#46178f,#864cbf);
margin:0;
color:white;
}

.container{
background:white;
color:#333;
padding:40px;
margin:40px auto;
max-width:600px;
border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

h1{color:#46178f;}

button{
padding:14px;
margin:10px;
font-size:18px;
cursor:pointer;
border:none;
border-radius:10px;
transition:0.2s;
font-weight:bold;
}

button:hover{transform:scale(1.05);}

.answer{
display:block;
width:100%;
margin:12px 0;
font-size:18px;
color:white;
}

.answer{
display:block;
width:100%;
margin:12px 0;
font-size:18px;
color:white;
}

.answer.color1{background:#e21b3c;}
.answer.color2{background:#1368ce;}
.answer.color3{background:#d89e00;}
.answer.color4{background:#26890c;}
.hidden{display:none;}

#question{font-size:28px;margin-bottom:25px;}

#progressBarContainer{
width:100%;
height:14px;
background:#eee;
border-radius:10px;
overflow:hidden;
margin:25px 0 15px 0;
}

#progressBar{
height:100%;
width:0%;
background:linear-gradient(90deg,#46178f,#864cbf);
transition:width 0.3s ease;
}

#statsButton{
position:fixed;
top:15px;
right:15px;
background:white;
color:#46178f;
border:none;
padding:10px 14px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

#statsPanel{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.98);
color:#333;
padding:30px;
overflow:auto;
}

#statsPanel h2{color:#46178f;}

.stats-header,.stat-item{
display:grid;
grid-template-columns:60px 1fr 1fr 80px;
}

.stats-header{
font-weight:bold;
padding:10px;
border-bottom:2px solid #46178f;
color:#46178f;
}

.stat-item{
align-items:center;
padding:10px;
border-bottom:1px solid #eee;
}

.col.rank{font-weight:bold;color:#46178f;}
.col.name{text-align:left;font-weight:600;}
.col.pref{color:#555;}
.col.points{font-weight:bold;color:#1368ce;}
</style>
</head>

<body>

<button id="statsButton" onclick="toggleStats()">📊 Stats</button>

<div class="container">

<h1>Quiz Départements 🇫🇷</h1>

<div id="game">
<h2 id="question"></h2>

<div id="answers"></div>

<div id="progressBarContainer">
  <div id="progressBar"></div>
</div>

<p>Score : <span id="score">0</span></p>
<p id="progress"></p>
</div>

<div id="gameover" class="hidden">
<h2>❌ Fin de partie</h2>
<p id="correct"></p>
<p>Score final : <span id="finalScore"></span></p>
<button onclick="replaySame()">Rejouer</button>
</div>

</div>

<div id="statsPanel" class="hidden">
<h2>🏆 Classement des départements</h2>

<div class="stats-header">
  <div>#</div><div>Département</div><div>Préfecture</div><div>Points</div>
</div>

<div id="statsList"></div>

<button onclick="toggleStats()">Retour</button>
</div>

<script>

/* ===== LOGIQUE ===== */

let weights = JSON.parse(localStorage.getItem("weights") || "{}");

function getWeight(d){return weights[d.name]||0;}

function setWeight(d,v){
weights[d.name]=Math.max(0,v);
localStorage.setItem("weights",JSON.stringify(weights));
}

function weightedShuffle(arr){
return arr.map(d=>({d,score:Math.random()/(1+getWeight(d))}))
.sort((a,b)=>a.score-b.score).map(x=>x.d);
}

let orderedDepartements=[],index=0,score=0,current,answerType;

function getMode(w){
if(w<=5) return "input";
if(w<=10) return 16;
if(w<=15) return 8;
if(w<=20) return 4;
return 2;
}

function startGame(){
orderedDepartements=weightedShuffle([...departements]);
index=0;score=0;
document.getElementById("score").innerText=0;
document.getElementById("gameover").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");
nextQuestion();
}

function nextQuestion(){
if(index>=orderedDepartements.length){victory();return;}

current=orderedDepartements[index];

let q=Math.random()<0.5?"name":"prefecture";
answerType=q==="name"?"prefecture":"name";

document.getElementById("question").innerText="Trouve : "+current[q];
document.getElementById("progress").innerText=(index+1)+" / "+departements.length;

let mode=getMode(getWeight(current));
const container=document.getElementById("answers");
container.innerHTML="";

if(mode==="input"){
let input=document.createElement("input");
let btn=document.createElement("button");
input.placeholder="Ta réponse";
btn.innerText="Valider";
btn.onclick=()=>checkAnswer({manual:input.value});
container.appendChild(input);
container.appendChild(btn);
return;
}

let answers=[current];
while(answers.length<mode){
let d=departements[Math.floor(Math.random()*departements.length)];
if(!answers.includes(d)) answers.push(d);
}
answers.sort(()=>Math.random()-0.5);

const colors = ["color1","color2","color3","color4"];

answers.forEach((d,i)=>{
let b=document.createElement("button");
b.className="answer " + colors[i % colors.length];
b.innerText=d[answerType];
b.onclick=()=>checkAnswer(d);
container.appendChild(b);
});
}

function checkAnswer(d){
if(d.manual){
if(d.manual.toLowerCase().trim()===current[answerType].toLowerCase()) correct();
else wrong();
return;
}
if(d===current) correct();
else wrong();
}

function correct(){
setWeight(current,getWeight(current)-1);
score++;index++;
document.getElementById("score").innerText=score;
nextQuestion();
}

function wrong(){
setWeight(current,getWeight(current)+3);
document.getElementById("game").classList.add("hidden");
document.getElementById("gameover").classList.remove("hidden");
document.getElementById("correct").innerText="Bonne réponse : "+current[answerType];
document.getElementById("finalScore").innerText=score;
}

function victory(){
document.getElementById("game").classList.add("hidden");
document.getElementById("gameover").classList.remove("hidden");
document.querySelector("#gameover h2").innerText="🎉 Victoire";
document.getElementById("correct").innerText="Tous les départements trouvés !";
document.getElementById("finalScore").innerText=score;
}

function replaySame(){startGame();}

function toggleStats(){
document.getElementById("statsPanel").classList.toggle("hidden");
if(!document.getElementById("statsPanel").classList.contains("hidden")) renderStats();
}

function renderStats(){
let c=document.getElementById("statsList");
c.innerHTML="";
[...departements].sort((a,b)=>getWeight(b)-getWeight(a))
.forEach((d,i)=>{
c.innerHTML+=`
<div class="stat-item">
<span class="col rank">${i+1}</span>
<span class="col name">${d.name}</span>
<span class="col pref">${d.prefecture}</span>
<span class="col points">${getWeight(d)}</span>
</div>`;
});
}

window.onload=startGame;
</script>
